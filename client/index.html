<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- 1. 核心 SEO 标题 -->
    <title>🤠潇洒科技网站🤠“在潇洒科技，看技术，也看生活。”</title>
    
    <!-- 2. 搜索结果描述 - 决定用户在搜索结果里看到的介绍 -->
    <meta name="description" content="潇洒科技网站，专注于分享前沿编程技术、效率工具测评及极客生活随感。我们致力于用最简单的语言拆解复杂技术，在代码与文字间寻觅一份洒脱。立即访问，与千万开发者共同交流成长。" />
    <meta name="keywords" content="潇洒科技, 个人博客, 编程技术, 效率工具, 生活技能" />

    <!-- 3. Open Graph 协议 - 让你的链接在社交软件(TG/Twitter)上显示精美卡片 -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="🤠潇洒科技网站🤠" />
    <meta property="og:description" content="在潇洒科技，看技术，也看生活。" />
    <meta property="og:url" content="https://rinblog.oouu.de5.net/" />
    <!-- 建议在根目录放一张封面图命名为 og-image.png -->
    <meta property="og:image" content="https://rinblog.oouu.de5.net/api/blob/images/bfb813a9c6383d5d35cc638594fe9e31ce6ec3be.jpeg" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- 4. 结构化数据 - 帮助 Google 识别你的身份 -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Blog",
      "name": "潇洒科技",
      "author": {
        "@type": "Person",
        "name": "潇洒",
        "url": "https://rinblog.oouu.de5.net/"
      },
      "description": "左手代码，右手诗情。愿你在这里不仅能找到答案，更能遇见一份洒脱。"
    }
    </script>

    <script>
      // 将上面的标题自动同步给全局变量，供 React 路由读取
      window.SEO_TITLE = document.title;
    </script>
    <script data-cfasync="false" src="/api/config/client/bootstrap.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
